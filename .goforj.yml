project_name: harbor
module_name: github.com/goforj/harbor
updated_at: 2026-07-17 23:23:48 CDT
dev:
  pre:
    - name: Handoff Harbor daemon
      cmd: go run ./cmd/devhandoff
  down: []
  auto_migrate: false
  down_on_exit: true
  sound_on_watch_error: true
  wire_paths:
    - app/wire
  apps:
    harbord:
      build:
        exec: go build -o ./bin/harbord ./cmd/harbord
        watch: [.go, .env, .env.*, go.mod, go.sum]
        ignore: [desktop, bin, .tmp]
      run:
        exec: ./bin/harbord migrate && ./bin/harbord --foreground
        env:
          HARBOR_SOURCE_DEVELOPMENT_HANDOFF: "1"
  watches:
    - name: Build Harbor Output Broker
      root: .
      watch: [./cmd/outputbroker, ./internal/projectprocess, ./go.mod, ./go.sum]
      exec: go build -o ./bin/outputbroker ./cmd/outputbroker
    - name: Harbor Desktop
      root: .
      watch: [./.goforj.yml]
      workdir: ./desktop
      exec: wails dev -reloaddirs ../internal/control,../internal/domain,../internal/helper,../internal/helper/launcher,../internal/networkdataplaneapproval,../internal/networkresolverapproval,../internal/networkresolverpolicymigrationapproval,../internal/networksetupapproval,../internal/projectapproval,../internal/rpc
render:
  components: [cli]
  starter_kit: none
  help_format: guided
  goforj_version: 0.19.0
apps:
  harbord:
    components: [cli, database_sqlite]
    starter_kit: none
    help_format: guided
