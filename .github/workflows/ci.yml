name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  root-go:
    name: Root Go (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  phase1-control:
    name: Phase 1 control (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            suffix: ""
          - name: macOS
            os: macos-14
            suffix: ""
          - name: Windows
            os: windows-2022
            suffix: .exe
    env:
      HARBOR_PHASE1_CLI_BINARY: ${{ github.workspace }}/harbor-phase1${{ matrix.suffix }}
      HARBOR_PHASE1_DAEMON_BINARY: ${{ github.workspace }}/harbord-phase1${{ matrix.suffix }}
      HARBOR_PHASE1_EVIDENCE_DIRECTORY: ${{ github.workspace }}/harbor-phase1-evidence
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet Phase 1 harness
        run: go vet -tags=phase1acceptance ./internal/acceptance

      - name: Build race-enabled production binaries
        run: |
          go build -race -o "${{ env.HARBOR_PHASE1_CLI_BINARY }}" ./cmd/app
          go build -race -o "${{ env.HARBOR_PHASE1_DAEMON_BINARY }}" ./cmd/harbord

      - name: Exercise production Phase 1 lifecycle
        run: go test -race -tags=phase1acceptance -count=1 -timeout=8m -run '^TestPhase1ProductionLifecycle$' ./internal/acceptance

      - name: Upload bounded redacted evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase1-control-${{ matrix.name }}
          path: |
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/summary.json
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/daemon-generation-1-hard-kill.log
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/daemon-generation-2-restart.log
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/daemon-generation-3-startup-recovery.log
          if-no-files-found: warn
          retention-days: 7

  platform-loopback:
    name: Loopback lifecycle (${{ matrix.name }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            binary: harbor-loopback.test
          - name: macOS
            os: macos-14
            binary: harbor-loopback.test
          - name: Windows
            os: windows-2022
            binary: harbor-loopback.test.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build focused platform test
        run: go test -c -o "${{ runner.temp }}/${{ matrix.binary }}" ./internal/platform/loopback

      - name: Exercise loopback lifecycle on Unix
        if: runner.os != 'Windows'
        run: sudo env HARBOR_PRIVILEGED_LOOPBACK_TEST=1 "${{ runner.temp }}/${{ matrix.binary }}" -test.run '^TestPrivilegedAdapterLifecycle$' -test.v

      - name: Exercise loopback lifecycle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:HARBOR_PRIVILEGED_LOOPBACK_TEST = "1"
          & "${{ runner.temp }}\${{ matrix.binary }}" "-test.run=^TestPrivilegedAdapterLifecycle$" "-test.v"

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: desktop/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build production frontend
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium smoke tests
        run: npm run test:e2e -- --project=chromium

      - name: Stage production frontend
        uses: actions/upload-artifact@v7
        with:
          name: desktop-frontend
          path: desktop/frontend/dist
          if-no-files-found: error
          retention-days: 1

  native-desktop:
    name: Desktop (${{ matrix.name }})
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            go_tags: -tags=webkit2_41
            build_args: -tags webkit2_41
          - name: macOS
            os: macos-14
            go_tags: ""
            build_args: ""
          - name: Windows
            os: windows-2022
            go_tags: ""
            build_args: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Restore production frontend
        uses: actions/download-artifact@v8
        with:
          name: desktop-frontend
          path: desktop/frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Test desktop module
        working-directory: desktop
        run: go test ${{ matrix.go_tags }} ./...

      - name: Vet desktop module
        working-directory: desktop
        run: go vet ${{ matrix.go_tags }} ./...

      - name: Build native desktop application
        working-directory: desktop
        run: wails build -s ${{ matrix.build_args }}
