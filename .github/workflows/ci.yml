name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  root-go:
    name: Root Go (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Build focused Windows NRPT resolver test
        if: runner.os == 'Windows'
        run: go test -c -o "${{ runner.temp }}/harbor-resolver.test.exe" ./internal/platform/resolver

      - name: Exercise Windows NRPT lifecycle as Administrator
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:HARBOR_PRIVILEGED_RESOLVER_TEST = '1'
          & "${{ runner.temp }}/harbor-resolver.test.exe" -test.run '^TestPrivilegedWindowsNRPTAdapterLifecycle$' -test.v
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build focused Linux resolver test
        if: runner.os == 'Linux'
        run: go test -c -o "${{ runner.temp }}/harbor-resolver.test" ./internal/platform/resolver

      - name: Exercise Linux systemd-resolved lifecycle and recovery as root
        if: runner.os == 'Linux'
        run: |
          if ! systemctl cat systemd-resolved.service >/dev/null 2>&1; then
            sudo apt-get update
            sudo env DEBIAN_FRONTEND=noninteractive apt-get install --yes systemd-resolved
          fi
          sudo install -d -o root -g root -m 0755 /etc/systemd/resolved.conf.d
          printf '[Resolve]\nDNS=\nDomains=\nFallbackDNS=\n' | sudo tee /etc/systemd/resolved.conf.d/00-harbor-ci-reset.conf >/dev/null
          cleanup() {
            sudo rm -f /etc/systemd/resolved.conf.d/00-harbor-ci-reset.conf
            sudo systemctl restart systemd-resolved.service || true
          }
          trap cleanup EXIT
          sudo systemctl enable --now systemd-resolved.service
          sudo systemctl restart systemd-resolved.service
          sudo env HARBOR_PRIVILEGED_RESOLVER_TEST=1 "${{ runner.temp }}/harbor-resolver.test" -test.run '^TestPrivilegedSystemdResolved(Adapter(Lifecycle|CrashRecovery)|RecoveryPreservesForeignQuarantine)$' -test.v

      - name: Build focused Darwin resolver test
        if: runner.os == 'macOS'
        run: go test -c -o "${{ runner.temp }}/harbor-resolver.test" ./internal/platform/resolver

      - name: Exercise Darwin resolver recovery as root
        if: runner.os == 'macOS'
        run: sudo env HARBOR_PRIVILEGED_RESOLVER_TEST=1 "${{ runner.temp }}/harbor-resolver.test" -test.run '^TestPrivilegedDarwinResolverReplacementCrashRecovery$' -test.v

      - name: Build focused Darwin runtime repair test
        if: runner.os == 'macOS'
        run: go test -c -o "${{ runner.temp }}/harbor-runtime-repair.test" ./internal/projectprocess

      - name: Exercise Darwin runtime repair lifecycle
        if: runner.os == 'macOS'
        run: env HARBOR_NATIVE_RUNTIME_REPAIR_TEST=1 "${{ runner.temp }}/harbor-runtime-repair.test" -test.run '^TestNativeDarwinRuntimeRepair(Lifecycle|RejectsAmbiguousScopeWithoutSignal|RejectsDriftWithoutSignal)$' -test.v

      - name: Build focused Darwin helper resolver test
        if: runner.os == 'macOS'
        run: go test -c -o "${{ runner.temp }}/harbor-helper-resolver.test" ./internal/helper/resolverhandler

      - name: Exercise Darwin helper resolver lifecycle as root
        if: runner.os == 'macOS'
        run: sudo env HARBOR_PRIVILEGED_RESOLVER_TEST=1 "${{ runner.temp }}/harbor-helper-resolver.test" -test.run '^TestPrivilegedDarwinResolverHandlerLifecycle$' -test.v

      - name: Build focused development bootstrap test
        if: runner.os != 'Windows'
        run: go test -c -o "${{ runner.temp }}/harbor-devbootstrap.test" ./internal/devbootstrap

      - name: Exercise development bootstrap transaction as root
        if: runner.os != 'Windows'
        run: |
          root_home=/root
          if [ "${{ runner.os }}" = "macOS" ]; then
            root_home=/private/var/root
          fi
          sudo env HOME="$root_home" "${{ runner.temp }}/harbor-devbootstrap.test" -test.run '^TestApplyPlatformPlan(IsIdempotentAndPreservesRuntimeData|TraversesDarwinLibraryAncestors)$' -test.v

      - name: Vet
        run: go vet ./...

  phase1-control:
    name: Phase 1 control (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            suffix: ""
          - name: macOS
            os: macos-14
            suffix: ""
          - name: Windows
            os: windows-2022
            suffix: .exe
    env:
      HARBOR_PHASE1_CLI_BINARY: ${{ github.workspace }}/harbor-phase1${{ matrix.suffix }}
      HARBOR_PHASE1_DAEMON_BINARY: ${{ github.workspace }}/harbord-phase1${{ matrix.suffix }}
      HARBOR_PHASE1_EVIDENCE_DIRECTORY: ${{ github.workspace }}/harbor-phase1-evidence
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet Phase 1 harness
        run: go vet -tags=phase1acceptance ./internal/acceptance

      - name: Build race-enabled production binaries
        run: |
          go build -race -o "${{ env.HARBOR_PHASE1_CLI_BINARY }}" ./cmd/app
          go build -race -o "${{ env.HARBOR_PHASE1_DAEMON_BINARY }}" ./cmd/harbord

      - name: Exercise production Phase 1 lifecycle
        run: go test -race -tags=phase1acceptance -count=1 -timeout=8m -run '^TestPhase1ProductionLifecycle$' ./internal/acceptance

      - name: Upload bounded redacted evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase1-control-${{ matrix.name }}
          path: |
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/summary.json
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/daemon-generation-1-hard-kill.log
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/daemon-generation-2-restart.log
            ${{ env.HARBOR_PHASE1_EVIDENCE_DIRECTORY }}/daemon-generation-3-startup-recovery.log
          if-no-files-found: warn
          retention-days: 7

  platform-loopback:
    name: Loopback lifecycle (${{ matrix.name }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            binary: harbor-loopback.test
          - name: macOS
            os: macos-14
            binary: harbor-loopback.test
          - name: Windows
            os: windows-2022
            binary: harbor-loopback.test.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build focused platform test
        run: go test -c -o "${{ runner.temp }}/${{ matrix.binary }}" ./internal/platform/loopback

      - name: Exercise loopback lifecycle on Unix
        if: runner.os != 'Windows'
        run: sudo env HARBOR_PRIVILEGED_LOOPBACK_TEST=1 "${{ runner.temp }}/${{ matrix.binary }}" -test.run '^TestPrivilegedAdapterLifecycle$' -test.v

      - name: Exercise loopback lifecycle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:HARBOR_PRIVILEGED_LOOPBACK_TEST = "1"
          & "${{ runner.temp }}\${{ matrix.binary }}" "-test.run=^TestPrivilegedAdapterLifecycle$" "-test.v"

  docker-adapter:
    name: Docker adapter and generated projects (Linux)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check out pinned GoForj source
        uses: actions/checkout@v7
        with:
          repository: goforj/goforj
          ref: bf5f5e65ab64ba25cbd2fe53e42014bff1115a81
          path: .ci/goforj
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            .ci/goforj/go.sum

      - name: Build pinned GoForj CLI
        run: |
          binary_directory="${RUNNER_TEMP}/harbor-bin"
          binary="${binary_directory}/forj"
          mkdir -p "$binary_directory"
          (
            cd .ci/goforj
            go build -trimpath -o "$binary" ./cmd/forj
          )
          printf 'HARBOR_PROJECT_IDENTITY_FORJ_BINARY=%s\n' "$binary" >> "$GITHUB_ENV"

      - name: Provision generated-project proof identities
        run: |
          ownership_file="${RUNNER_TEMP}/harbor-generated-project-identities"
          interface="lo"
          interface_index="$(cat "/sys/class/net/${interface}/ifindex")"
          : > "$ownership_file"
          for address in 127.77.254.10 127.77.254.11 127.77.254.12; do
            if ip -o -4 address show | awk '{print $4}' | grep -Fxq "$address/32"; then
              echo "generated-project identity already exists: $address" >&2
              exit 1
            fi
            sudo ip address add "$address/32" dev "$interface"
            printf '%s\t%s\t%s\n' "$interface" "$interface_index" "$address" >> "$ownership_file"
            mapfile -t observations < <(ip -o -4 address show dev "$interface" | awk -v target="$address/32" '$4 == target {print $1, $2, $4}')
            if [[ ${#observations[@]} -ne 1 ]]; then
              echo "could not uniquely observe generated-project identity: $address" >&2
              exit 1
            fi
            read -r observed_index observed_interface observed_address <<< "${observations[0]}"
            observed_index="${observed_index%:}"
            if [[ "$observed_index" != "$interface_index" || "$observed_interface" != "$interface" || "$observed_address" != "$address/32" ]]; then
              echo "generated-project identity does not match its intended interface: $address" >&2
              exit 1
            fi
          done

      - name: Exercise the read-only Docker adapter against Engine
        run: GOCACHE=/tmp/gocache GOMODCACHE=/tmp/gomodcache HARBOR_NATIVE_DOCKER_TEST=1 go test -count=1 -timeout=3m -run '^TestNativeDockerRuntimeAdmitsOnlyItsCheckoutAndFollowsReplacement$' ./internal/containerruntime

      - name: Exercise generated Compose service observation
        env:
          HARBOR_PROOF_ADDRESSES: 127.77.254.10,127.77.254.11,127.77.254.12
        run: GOCACHE=/tmp/gocache GOMODCACHE=/tmp/gomodcache go test -tags='projectidentityacceptance projectdockeracceptance' -count=1 -timeout=10m -run '^TestNativeGeneratedMySQLProjectsExposeComposeServices$' ./internal/reconcile

      - name: Remove generated-project proof identities
        if: always()
        run: |
          ownership_file="${RUNNER_TEMP}/harbor-generated-project-identities"
          if [[ -f "$ownership_file" ]]; then
            while IFS=$'\t' read -r interface expected_index address extra; do
              if [[ -n "$extra" || -z "$interface" || -z "$expected_index" || -z "$address" ]]; then
                echo "invalid generated-project ownership record" >&2
                exit 1
              fi
              current_index="$(cat "/sys/class/net/${interface}/ifindex" 2>/dev/null || true)"
              mapfile -t observations < <(ip -o -4 address show dev "$interface" 2>/dev/null | awk -v target="$address/32" '$4 == target {print $1, $2, $4}')
              if [[ "$current_index" != "$expected_index" || ${#observations[@]} -ne 1 ]]; then
                echo "generated-project identity ownership changed; refusing to remove $address" >&2
                exit 1
              fi
              read -r observed_index observed_interface observed_address <<< "${observations[0]}"
              observed_index="${observed_index%:}"
              if [[ "$observed_index" != "$expected_index" || "$observed_interface" != "$interface" || "$observed_address" != "$address/32" ]]; then
                echo "generated-project identity observation changed; refusing to remove $address" >&2
                exit 1
              fi
              sudo ip address delete "$address/32" dev "$interface"
            done < "$ownership_file"
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: desktop/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build production frontend
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium smoke tests
        run: npm run test:e2e -- --project=chromium

      - name: Stage production frontend
        uses: actions/upload-artifact@v7
        with:
          name: desktop-frontend
          path: desktop/frontend/dist
          if-no-files-found: error
          retention-days: 1

  native-desktop:
    name: Desktop (${{ matrix.name }})
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            go_tags: -tags=webkit2_41
            build_args: -tags webkit2_41
          - name: macOS
            os: macos-14
            go_tags: ""
            build_args: ""
          - name: Windows
            os: windows-2022
            go_tags: ""
            build_args: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Restore production frontend
        uses: actions/download-artifact@v8
        with:
          name: desktop-frontend
          path: desktop/frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Test desktop module
        working-directory: desktop
        run: go test ${{ matrix.go_tags }} ./...

      - name: Vet desktop module
        working-directory: desktop
        run: go vet ${{ matrix.go_tags }} ./...

      - name: Build native desktop application
        working-directory: desktop
        run: wails build -s ${{ matrix.build_args }}
